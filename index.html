<!doctype html>
<html lang="en" data-theme="yorha-dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://github.com/rafaeloledo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Rafael Ledo — Software Engineer. Blog, projects, and notes." />
    <title>YoRHa // rafael-ledo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (!t || t === 'terminal-dark') t = 'yorha-dark';
          else if (t === 'terminal-light') t = 'yorha-light';
          document.documentElement.setAttribute('data-theme', t);
        } catch (_) {}
      })();
    </script>
  </head>
  <body class="font-mono antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
