<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" role="img" aria-label="Adesso e Fortuna ~ Honō to Eien">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e14"/>
      <stop offset="100%" stop-color="#1a0a05"/>
    </linearGradient>
    <linearGradient id="flame" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ff4a1c" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ff6a2c" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffc77d" stop-opacity="1"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.55" r="0.45">
      <stop offset="0%" stop-color="#ffb060" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffb060" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M20 0 L0 0 0 20" fill="none" stroke="#3a2820" stroke-width="0.5" opacity="0.4"/>
    </pattern>
  </defs>

  <rect width="800" height="400" fill="url(#bg)"/>
  <rect width="800" height="400" fill="url(#grid)"/>
  <rect width="800" height="400" fill="url(#halo)"/>

  <!-- corner brackets -->
  <g stroke="#d4a35a" stroke-width="1.5" fill="none">
    <path d="M20 20 L20 60 M20 20 L60 20"/>
    <path d="M780 20 L780 60 M780 20 L740 20"/>
    <path d="M20 380 L20 340 M20 380 L60 380"/>
    <path d="M780 380 L780 340 M780 380 L740 380"/>
  </g>

  <!-- stylized flame motif (left) -->
  <g transform="translate(140 230)">
    <path d="M0 80 C -30 40, -20 0, 0 -60 C 15 -20, 40 0, 30 50 C 50 30, 60 0, 55 -30 C 80 10, 70 70, 30 90 C 10 100, -20 100, 0 80 Z"
          fill="url(#flame)" opacity="0.85"/>
    <path d="M0 60 C -10 30, 0 0, 10 -30 C 20 -10, 25 20, 15 50 C 5 70, -10 70, 0 60 Z"
          fill="#fff2c0" opacity="0.6"/>
  </g>

  <!-- ouroboros / eternity ring (right) -->
  <g transform="translate(620 200)" fill="none" stroke="#d4a35a" stroke-width="1.2">
    <circle r="80" opacity="0.6"/>
    <circle r="70" opacity="0.4"/>
    <circle r="55" opacity="0.25"/>
    <path d="M-80 0 A 80 80 0 0 1 80 0" stroke="#ffc77d" stroke-width="2"/>
    <!-- tick marks around circle -->
    <g stroke="#d4a35a" stroke-width="1">
      <line x1="0" y1="-85" x2="0" y2="-78"/>
      <line x1="0" y1="78" x2="0" y2="85"/>
      <line x1="-85" y1="0" x2="-78" y2="0"/>
      <line x1="78" y1="0" x2="85" y2="0"/>
      <line x1="-60" y1="-60" x2="-55" y2="-55"/>
      <line x1="60" y1="-60" x2="55" y2="-55"/>
      <line x1="-60" y1="60" x2="-55" y2="55"/>
      <line x1="60" y1="60" x2="55" y2="55"/>
    </g>
  </g>

  <!-- HUD label -->
  <g font-family="ui-monospace, Menlo, Consolas, monospace" fill="#d4a35a">
    <text x="40" y="55" font-size="11" letter-spacing="3" opacity="0.7">§ FREQUENCY · OST.014</text>
    <text x="40" y="320" font-size="11" letter-spacing="3" opacity="0.55">N.UEMATSU // FFVIII // 1999</text>
    <text x="40" y="340" font-size="11" letter-spacing="3" opacity="0.55">VOX: I.MASUDA</text>
    <text x="40" y="360" font-size="10" letter-spacing="4" opacity="0.45">LATIN · CHORAL · 0:54</text>
  </g>

  <!-- title block -->
  <g transform="translate(400 175)" text-anchor="middle">
    <text font-family="ui-serif, Georgia, serif" font-style="italic" fill="#ffc77d" font-size="42" letter-spacing="2">Adesso e Fortuna</text>
    <text y="38" font-family="ui-serif, Georgia, serif" fill="#7ec8d4" font-size="20" letter-spacing="6" opacity="0.85">～炎と永遠～</text>
    <text y="68" font-family="ui-monospace, Menlo, Consolas, monospace" fill="#d4a35a" font-size="10" letter-spacing="6" opacity="0.6">FLAME · ETERNITY</text>
  </g>

  <!-- bottom rule -->
  <line x1="40" y1="290" x2="760" y2="290" stroke="#d4a35a" stroke-width="0.5" opacity="0.4"/>
</svg>
