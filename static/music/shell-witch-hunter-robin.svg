<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f0b"/>
      <stop offset="100%" stop-color="#080807"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="45%" stop-color="#ca9d28"/>
      <stop offset="100%" stop-color="#e879a0"/>
    </linearGradient>
    <linearGradient id="flame-grad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#e87e28" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#ca9d28" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ca9d28" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ca9d28" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ca9d28" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-sm">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
    <filter id="blur-md">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Scanline overlay -->
  <rect width="800" height="450" fill="none" stroke="#eee8d5" stroke-width="0" opacity="0.03">
    <animate attributeName="opacity" values="0.03;0.05;0.03" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Chrome bar top -->
  <rect x="0" y="0" width="800" height="3" fill="url(#chrome)"/>

  <!-- Outer border -->
  <rect x="20" y="20" width="760" height="410" fill="none" stroke="#ca9d28" stroke-width="0.75" stroke-opacity="0.3"/>

  <!-- Corner brackets TL -->
  <polyline points="12,44 12,12 44,12" fill="none" stroke="#2dd4bf" stroke-width="2"/>
  <!-- Corner brackets TR -->
  <polyline points="788,44 788,12 756,12" fill="none" stroke="#2dd4bf" stroke-width="2"/>
  <!-- Corner brackets BL -->
  <polyline points="12,406 12,438 44,438" fill="none" stroke="#2dd4bf" stroke-width="2"/>
  <!-- Corner brackets BR -->
  <polyline points="788,406 788,438 756,438" fill="none" stroke="#2dd4bf" stroke-width="2"/>

  <!-- HUD label top-left -->
  <text x="32" y="44" font-family="'Courier New', monospace" font-size="11" fill="#2dd4bf" opacity="0.55" letter-spacing="2.5">§ MUSIC · /witch-hunter-robin</text>

  <!-- HUD label top-right -->
  <text x="768" y="44" font-family="'Courier New', monospace" font-size="11" fill="#ca9d28" opacity="0.45" letter-spacing="2" text-anchor="end">2002</text>

  <!-- Glow behind flame -->
  <ellipse cx="400" cy="260" rx="130" ry="100" fill="url(#glow)"/>
  <ellipse cx="400" cy="260" rx="90" ry="70" fill="url(#glow)" filter="url(#blur-md)"/>

  <!-- Flame shape (stylised, layered) -->
  <!-- Outer flame -->
  <path d="M400,390 C350,360 310,310 320,255 C328,215 355,200 375,220 C378,175 398,160 408,185 C420,160 448,170 445,205 C465,185 482,200 475,238 C492,270 480,330 450,360 Z"
    fill="url(#flame-grad)" opacity="0.35" filter="url(#blur-sm)"/>

  <!-- Mid flame -->
  <path d="M400,375 C368,350 342,310 350,268 C357,238 374,226 388,242 C391,208 405,196 413,215 C424,200 440,210 437,240 C452,224 464,238 459,264 C472,288 462,335 438,355 Z"
    fill="url(#flame-grad)" opacity="0.55"/>

  <!-- Inner bright flame -->
  <path d="M400,355 C382,335 368,305 374,276 C380,256 391,248 399,260 C402,240 410,232 416,246 C424,234 434,244 431,264 C442,250 450,262 446,280 C454,298 446,328 428,342 Z"
    fill="#e87e28" opacity="0.7" filter="url(#blur-sm)"/>

  <!-- Flame core -->
  <ellipse cx="400" cy="310" rx="22" ry="35" fill="#ffd06a" opacity="0.45" filter="url(#blur-sm)"/>

  <!-- Horizontal divider -->
  <line x1="200" y1="170" x2="600" y2="170" stroke="#ca9d28" stroke-width="0.6" stroke-opacity="0.4"/>

  <!-- SHELL — main title -->
  <text x="400" y="148" font-family="'Georgia', 'Cormorant Garamond', serif" font-size="72" fill="#eee8d5"
    text-anchor="middle" letter-spacing="18" font-style="italic" opacity="0.92">SHELL</text>

  <!-- Glitch layer 1 -->
  <text x="402" y="148" font-family="'Georgia', serif" font-size="72" fill="#2dd4bf"
    text-anchor="middle" letter-spacing="18" font-style="italic" opacity="0.12">SHELL</text>

  <!-- Glitch layer 2 -->
  <text x="398" y="150" font-family="'Georgia', serif" font-size="72" fill="#e879a0"
    text-anchor="middle" letter-spacing="18" font-style="italic" opacity="0.08">SHELL</text>

  <!-- Divider below title -->
  <line x1="200" y1="175" x2="600" y2="175" stroke="#ca9d28" stroke-width="0.6" stroke-opacity="0.4"/>

  <!-- Artist name -->
  <text x="400" y="205" font-family="'Courier New', monospace" font-size="13" fill="#2dd4bf"
    text-anchor="middle" letter-spacing="4" opacity="0.8">BANA  ·  YOKO KANNO</text>

  <!-- Anime title bottom -->
  <text x="400" y="415" font-family="'Courier New', monospace" font-size="11" fill="#eee8d5"
    text-anchor="middle" letter-spacing="3" opacity="0.35">WITCH HUNTER ROBIN  OP.1</text>

  <!-- Bottom status line -->
  <text x="32" y="435" font-family="'Courier New', monospace" font-size="9" fill="#2dd4bf" opacity="0.3" letter-spacing="1.5">SYS:ONLINE · MODE:PLAYBACK</text>
  <text x="768" y="435" font-family="'Courier New', monospace" font-size="9" fill="#ca9d28" opacity="0.3" letter-spacing="1.5" text-anchor="end">TRACK 01/∞</text>
</svg>
