<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#120a06"/>
      <stop offset="100%" stop-color="#0a0503"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="45%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="quake-grad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#dc2626" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#dc2626" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-sm">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
    <filter id="blur-md">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Scanline overlay -->
  <rect width="800" height="450" fill="none" stroke="#fde68a" stroke-width="0" opacity="0.03">
    <animate attributeName="opacity" values="0.03;0.05;0.03" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Chrome bar top -->
  <rect x="0" y="0" width="800" height="3" fill="url(#chrome)"/>

  <!-- Outer border -->
  <rect x="20" y="20" width="760" height="410" fill="none" stroke="#f59e0b" stroke-width="0.75" stroke-opacity="0.3"/>

  <!-- Corner brackets TL -->
  <polyline points="12,44 12,12 44,12" fill="none" stroke="#dc2626" stroke-width="2"/>
  <!-- Corner brackets TR -->
  <polyline points="788,44 788,12 756,12" fill="none" stroke="#dc2626" stroke-width="2"/>
  <!-- Corner brackets BL -->
  <polyline points="12,406 12,438 44,438" fill="none" stroke="#dc2626" stroke-width="2"/>
  <!-- Corner brackets BR -->
  <polyline points="788,406 788,438 756,438" fill="none" stroke="#dc2626" stroke-width="2"/>

  <!-- HUD label top-left -->
  <text x="32" y="44" font-family="'Courier New', monospace" font-size="11" fill="#dc2626" opacity="0.6" letter-spacing="2.5">§ MUSIC · /more-earthshaker</text>

  <!-- HUD label top-right -->
  <text x="768" y="44" font-family="'Courier New', monospace" font-size="11" fill="#f59e0b" opacity="0.45" letter-spacing="2" text-anchor="end">1984</text>

  <!-- Glow behind seismic burst -->
  <ellipse cx="400" cy="300" rx="150" ry="90" fill="url(#glow)"/>
  <ellipse cx="400" cy="300" rx="100" ry="60" fill="url(#glow)" filter="url(#blur-md)"/>

  <!-- Seismograph trace (the earth shaking) -->
  <polyline
    points="120,300 180,300 210,260 240,340 270,210 300,360 330,250 360,300 400,180 440,300 470,250 500,360 530,210 560,340 590,260 620,300 680,300"
    fill="none" stroke="url(#quake-grad)" stroke-width="3" opacity="0.85" stroke-linejoin="round" stroke-linecap="round" filter="url(#blur-sm)"/>
  <polyline
    points="120,300 180,300 210,260 240,340 270,210 300,360 330,250 360,300 400,180 440,300 470,250 500,360 530,210 560,340 590,260 620,300 680,300"
    fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.9" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Ground crack lines -->
  <polyline points="200,388 300,372 360,392 440,372 520,392 600,376" fill="none" stroke="#dc2626" stroke-width="1" opacity="0.4"/>

  <!-- Horizontal divider -->
  <line x1="200" y1="170" x2="600" y2="170" stroke="#f59e0b" stroke-width="0.6" stroke-opacity="0.4"/>

  <!-- MORE — main title -->
  <text x="400" y="148" font-family="'Georgia', 'Cormorant Garamond', serif" font-size="76" fill="#fde68a"
    text-anchor="middle" letter-spacing="22" font-style="italic" opacity="0.94">MORE</text>

  <!-- Glitch layer 1 -->
  <text x="402" y="148" font-family="'Georgia', serif" font-size="76" fill="#dc2626"
    text-anchor="middle" letter-spacing="22" font-style="italic" opacity="0.14">MORE</text>

  <!-- Glitch layer 2 -->
  <text x="398" y="150" font-family="'Georgia', serif" font-size="76" fill="#fbbf24"
    text-anchor="middle" letter-spacing="22" font-style="italic" opacity="0.1">MORE</text>

  <!-- Divider below title -->
  <line x1="200" y1="175" x2="600" y2="175" stroke="#f59e0b" stroke-width="0.6" stroke-opacity="0.4"/>

  <!-- Artist name -->
  <text x="400" y="205" font-family="'Courier New', monospace" font-size="13" fill="#dc2626"
    text-anchor="middle" letter-spacing="5" opacity="0.85">EARTHSHAKER · アースシェイカー</text>

  <!-- Release line bottom -->
  <text x="400" y="415" font-family="'Courier New', monospace" font-size="11" fill="#fde68a"
    text-anchor="middle" letter-spacing="3" opacity="0.35">1st SINGLE · OSAKA HEAVY METAL</text>

  <!-- Bottom status line -->
  <text x="32" y="435" font-family="'Courier New', monospace" font-size="9" fill="#dc2626" opacity="0.3" letter-spacing="1.5">SYS:ONLINE · MODE:PLAYBACK</text>
  <text x="768" y="435" font-family="'Courier New', monospace" font-size="9" fill="#f59e0b" opacity="0.3" letter-spacing="1.5" text-anchor="end">TRACK 01/∞</text>
</svg>
