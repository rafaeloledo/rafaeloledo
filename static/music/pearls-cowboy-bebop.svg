<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Pearls - Cowboy Bebop">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050810"/>
      <stop offset="100%" stop-color="#0a0d1a"/>
    </linearGradient>
    <radialGradient id="moon-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c8d8f0" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#c8d8f0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pearl-shine" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#d0e8f8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7090b8" stop-opacity="0.3"/>
    </radialGradient>
    <linearGradient id="ocean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a5c" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#050810" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="blur-sm">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="blur-md">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Stars -->
  <g fill="#c8d8f0" opacity="0.5">
    <circle cx="60" cy="40" r="0.8"/>
    <circle cx="120" cy="80" r="1.2"/>
    <circle cx="200" cy="30" r="0.6"/>
    <circle cx="320" cy="55" r="0.9"/>
    <circle cx="480" cy="25" r="1"/>
    <circle cx="580" cy="70" r="0.7"/>
    <circle cx="680" cy="35" r="1.1"/>
    <circle cx="740" cy="90" r="0.8"/>
    <circle cx="90" cy="130" r="0.6"/>
    <circle cx="710" cy="140" r="0.9"/>
    <circle cx="150" cy="180" r="0.5"/>
    <circle cx="650" cy="190" r="0.7"/>
  </g>

  <!-- Moon glow halo -->
  <ellipse cx="620" cy="130" rx="90" ry="90" fill="url(#moon-glow)" filter="url(#blur-md)"/>

  <!-- Moon -->
  <circle cx="620" cy="130" r="52" fill="#d8e8f8" opacity="0.12"/>
  <circle cx="620" cy="130" r="46" fill="#c8d8f0" opacity="0.18"/>
  <!-- Crescent mask -->
  <circle cx="638" cy="124" r="44" fill="#050810" opacity="0.7"/>

  <!-- Ocean waves (bottom) -->
  <rect x="0" y="340" width="800" height="110" fill="url(#ocean)"/>
  <path d="M0,350 C80,338 160,362 240,350 C320,338 400,362 480,350 C560,338 640,362 720,350 L720,450 L0,450 Z"
        fill="#0d2a44" opacity="0.5"/>
  <path d="M0,365 C100,353 200,377 300,365 C400,353 500,377 600,365 C700,353 800,365 800,365 L800,450 L0,450 Z"
        fill="#0a1e33" opacity="0.6"/>

  <!-- Pearl cluster -->
  <!-- Large central pearl -->
  <circle cx="400" cy="270" r="36" fill="url(#pearl-shine)" filter="url(#blur-sm)" opacity="0.9"/>
  <circle cx="400" cy="270" r="34" fill="none" stroke="#c8d8f0" stroke-width="0.8" opacity="0.4"/>
  <!-- Pearl highlight -->
  <ellipse cx="390" cy="258" rx="10" ry="7" fill="#ffffff" opacity="0.5" filter="url(#blur-sm)"/>

  <!-- Smaller pearls -->
  <circle cx="355" cy="300" r="20" fill="url(#pearl-shine)" opacity="0.7"/>
  <ellipse cx="348" cy="293" rx="5" ry="4" fill="#ffffff" opacity="0.4" filter="url(#blur-sm)"/>

  <circle cx="445" cy="295" r="16" fill="url(#pearl-shine)" opacity="0.65"/>
  <ellipse cx="439" cy="289" rx="4" ry="3" fill="#ffffff" opacity="0.35" filter="url(#blur-sm)"/>

  <circle cx="375" cy="240" r="12" fill="url(#pearl-shine)" opacity="0.6"/>
  <circle cx="428" cy="248" r="9" fill="url(#pearl-shine)" opacity="0.55"/>
  <circle cx="330" cy="268" r="8" fill="url(#pearl-shine)" opacity="0.5"/>

  <!-- Corner brackets -->
  <g stroke="#8ab0d0" stroke-width="1.5" fill="none" opacity="0.6">
    <path d="M20 20 L20 55 M20 20 L55 20"/>
    <path d="M780 20 L780 55 M780 20 L745 20"/>
    <path d="M20 430 L20 395 M20 430 L55 430"/>
    <path d="M780 430 L780 395 M780 430 L745 430"/>
  </g>

  <!-- Top chrome bar -->
  <rect x="0" y="0" width="800" height="2.5" fill="#8ab0d0" opacity="0.7"/>

  <!-- HUD labels -->
  <text x="34" y="42" font-family="'Courier New', monospace" font-size="11" fill="#8ab0d0" opacity="0.55" letter-spacing="2.5">§ MUSIC · /cowboy-bebop</text>
  <text x="766" y="42" font-family="'Courier New', monospace" font-size="11" fill="#8ab0d0" opacity="0.45" letter-spacing="2" text-anchor="end">2004</text>

  <!-- Divider above title -->
  <line x1="160" y1="130" x2="640" y2="130" stroke="#8ab0d0" stroke-width="0.5" stroke-opacity="0.3"/>

  <!-- Main title -->
  <text x="400" y="110" font-family="'Georgia', 'Times New Roman', serif" font-size="68" fill="#d8e8f8"
        text-anchor="middle" letter-spacing="14" font-style="italic" opacity="0.92">PEARLS</text>

  <!-- Glitch layers -->
  <text x="402" y="110" font-family="'Georgia', serif" font-size="68" fill="#5090c0"
        text-anchor="middle" letter-spacing="14" font-style="italic" opacity="0.1">PEARLS</text>
  <text x="398" y="112" font-family="'Georgia', serif" font-size="68" fill="#c0d8f0"
        text-anchor="middle" letter-spacing="14" font-style="italic" opacity="0.07">PEARLS</text>

  <!-- Divider below title -->
  <line x1="160" y1="135" x2="640" y2="135" stroke="#8ab0d0" stroke-width="0.5" stroke-opacity="0.3"/>

  <!-- Artist -->
  <text x="400" y="162" font-family="'Courier New', monospace" font-size="13" fill="#8ab0d0"
        text-anchor="middle" letter-spacing="4" opacity="0.8">ILARIA GRAZIANO  ·  YOKO KANNO</text>

  <!-- Anime title bottom -->
  <text x="400" y="418" font-family="'Courier New', monospace" font-size="11" fill="#d8e8f8"
        text-anchor="middle" letter-spacing="3" opacity="0.3">COWBOY BEBOP  TANK! THE! BEST!</text>

  <!-- Bottom status -->
  <text x="34" y="438" font-family="'Courier New', monospace" font-size="9" fill="#8ab0d0" opacity="0.3" letter-spacing="1.5">SYS:ONLINE · MODE:PLAYBACK</text>
  <text x="766" y="438" font-family="'Courier New', monospace" font-size="9" fill="#8ab0d0" opacity="0.3" letter-spacing="1.5" text-anchor="end">ITALIANO · VOCAL</text>
</svg>
